name: CryptoRisk Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install .

      - name: Run security scan
        run: python -m cryptorisk.cli .

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: cryptorisk-report
          path: report.json